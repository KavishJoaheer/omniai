services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: omniai
      POSTGRES_PASSWORD: omniai
      POSTGRES_DB: omniai
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omniai -d omniai"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: omniai
      MINIO_ROOT_PASSWORD: omniai-minio-dev
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20

  opensearch:
    image: opensearchproject/opensearch:2.15.0
    environment:
      discovery.type: single-node
      bootstrap.memory_lock: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
      DISABLE_SECURITY_PLUGIN: "true"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  api:
    image: python:3.12-slim
    working_dir: /workspace
    command: >
      sh -c "pip install -e ./backend &&
      alembic -c backend/alembic.ini upgrade head &&
      uvicorn omniai.interfaces.http.app:create_app --factory --host 0.0.0.0 --port 9380 --app-dir backend"
    ports:
      - "9380:9380"
    environment:
      HTTP_PORT: 9380
      APP_ENV: development
      APP_NAME: Omni-AI
      API_CORS_ORIGINS: http://localhost:5173
      DB_URL: postgresql+psycopg://omniai:omniai@postgres:5432/omniai
      REDIS_URL: redis://redis:6379/0
      OBJECT_STORE_KIND: s3
      OBJECT_STORE_ENDPOINT: http://minio:9000
      OBJECT_STORE_REGION: us-east-1
      OBJECT_STORE_ACCESS_KEY: omniai
      OBJECT_STORE_SECRET_KEY: omniai-minio-dev
      OBJECT_STORE_BUCKET: omniai
      SEARCH_KIND: opensearch
      SEARCH_URL: http://opensearch:9200
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      ENCRYPTION_KEY: dev-only-do-not-use-in-prod-change-me-32b
      AUTH_SECRET: dev-only-change-me
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    volumes:
      - ../..:/workspace

  frontend:
    image: node:20
    working_dir: /workspace/frontend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ../..:/workspace
    depends_on:
      - api

volumes:
  postgres-data:
  minio-data:
  opensearch-data:
