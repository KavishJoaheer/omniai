apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "omniai.fullname" . }}-frontend
  labels: {{- include "omniai.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      {{- include "omniai.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        {{- include "omniai.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          env:
            - name: NGINX_PORT
              value: "8080"
            - name: BACKEND_URL
              value: "http://{{ include "omniai.fullname" . }}-api:{{ .Values.api.service.port }}"
          ports:
            - containerPort: 8080
              name: http
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 2
            periodSeconds: 5
          resources: {{- toYaml .Values.frontend.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "omniai.fullname" . }}-frontend
  labels: {{- include "omniai.labels" . | nindent 4 }}
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "omniai.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
