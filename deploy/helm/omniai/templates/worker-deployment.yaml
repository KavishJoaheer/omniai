apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "omniai.fullname" . }}-worker
  labels: {{- include "omniai.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      {{- include "omniai.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "omniai.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker
    spec:
      containers:
        - name: worker
          image: "{{ .Values.worker.image.repository }}:{{ .Values.worker.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          env:
            - name: OMNIAI_ROLE
              value: worker
            {{- include "omniai.commonEnv" . | nindent 12 }}
          # The worker has no HTTP port; we use a process-presence liveness
          # probe via `pgrep arq` so dead workers get restarted.
          livenessProbe:
            exec:
              command: ["sh", "-c", "pgrep -f 'arq omniai.workers' >/dev/null"]
            initialDelaySeconds: 20
            periodSeconds: 30
            failureThreshold: 3
          resources: {{- toYaml .Values.worker.resources | nindent 12 }}
